name: Agent Renova - Repository Cleanup
run-name: Agent Renova - Repository Cleanup

on:
  workflow_dispatch:
    inputs:
      cleanup_type:
        description: 'Type of cleanup to perform'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'workflow-runs'
          - 'artifacts'
          - 'branches'
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: write
  actions: write
  id-token: write
  pull-requests: read
  issues: read

jobs:
  cleanup:
    uses: hedinbil/hedin-github-actions-public/.github/workflows/agent-renova.yml@main
    secrets: inherit
    with:
      cleanup-type: ${{ github.event.inputs.cleanup_type || 'all' }}
