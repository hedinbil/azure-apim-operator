name: Agent Wille - Worklog Automation
run-name: Wille Run ${{ github.run_number }}

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  wille-worklog:
    uses: hedinbil/hedin-github-actions/.github/workflows/agent-wille.yml@main
    secrets: inherit
    with:
      otel-team: operations
