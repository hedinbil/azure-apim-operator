---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: apimapis.apim.operator.io
spec:
  group: apim.operator.io
  names:
    kind: APIMAPI
    listKind: APIMAPIList
    plural: apimapis
    singular: apimapi
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: |-
          APIMAPI is the Schema for the apimapis API.
          APIMAPI is a Kubernetes custom resource that represents an API in Azure API Management.
          When created, it triggers the import of an OpenAPI definition into APIM and configures
          the API with the specified route prefix, service URL, products, and tags.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state of the API in APIM.
            properties:
              APIID:
                description: APIID is the unique identifier for the API in Azure APIM.
                type: string
              apimService:
                description: |-
                  APIMService is the name of the APIMService custom resource that references
                  the Azure API Management service instance.
                type: string
              openApiDefinitionUrl:
                description: OpenAPIDefinitionURL is the URL where the OpenAPI/Swagger
                  definition can be fetched.
                type: string
              productIds:
                description: |-
                  ProductIDs is a list of product IDs to associate this API with in APIM.
                  Products are used to group APIs and require subscriptions.
                items:
                  type: string
                type: array
              routePrefix:
                description: RoutePrefix is the base route path in APIM (e.g., "/myapi").
                type: string
              serviceUrl:
                description: ServiceURL is the backend service URL that APIM will
                  proxy requests to.
                type: string
              subscriptionRequired:
                default: true
                description: |-
                  SubscriptionRequired controls whether a subscription key is required to access the API.
                  If set to false, the API can be accessed without a subscription key.
                  If not specified, defaults to true (subscription required).
                type: boolean
              tagIds:
                description: |-
                  TagIDs is a list of tag IDs to apply to this API in APIM.
                  Tags are used for categorization and organization.
                items:
                  type: string
                type: array
              target:
                description: |-
                  Target optionally selects which ReplicaSets should trigger imports for this API.
                  If omitted, the operator falls back to matching metadata.name with the
                  ReplicaSet app.kubernetes.io/name label.
                properties:
                  selector:
                    description: Selector matches ReplicaSets whose readiness events
                      should trigger this API import.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
            required:
            - APIID
            - apimService
            - openApiDefinitionUrl
            - routePrefix
            - serviceUrl
            - subscriptionRequired
            type: object
          status:
            description: Status reflects the observed state of the API in APIM.
            properties:
              apiHost:
                description: ApiHost is the full URL to access the API through APIM
                  (e.g., "https://api.example.com/myapi").
                type: string
              developerPortalHost:
                description: DeveloperPortalHost is the URL of the APIM developer
                  portal.
                type: string
              importedAt:
                description: ImportedAt is the timestamp when the API was successfully
                  imported into APIM.
                type: string
              status:
                description: Status indicates the current status of the API (e.g.,
                  "OK", "Error").
                type: string
            required:
            - apiHost
            - developerPortalHost
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
